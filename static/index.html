<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>airs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.iife.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.32/dist/uPlot.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Berkeley+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --surface: #141416;
            --surface2: #1c1c20;
            --border: #27272d;
            --border2: #35353d;
            --text: #e8e8ec;
            --muted: #6b6b7a;
            --accent: #7c6aff;
            --accent2: #a78bfa;
            --human: #2a2a35;
            --assistant: #161620;
            --highlight-border: #7c6aff;
            --match: #fbbf2444;
            --match-text: #fbbf24;
            --mono: 'Berkeley Mono', 'Fira Code', monospace;
            --serif: 'Instrument Serif', Georgia, serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: 22% 78%;
            height: 100vh;
        }

        /* ── LEFT ── */
        #left {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--surface);
            overflow: hidden;
        }

        #left-header {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #left-header h1 {
            font-family: var(--serif);
            font-size: 20px;
            font-style: italic;
            color: var(--accent2);
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            padding: 7px 10px 7px 30px;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        #result-meta {
            padding: 8px 14px 6px;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        #convo-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }

        .convo-card {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 4px 8px;
            align-items: start;
        }

        .convo-card:hover {
            background: var(--surface2);
        }

        .convo-card.active {
            background: #1e1b3a;
            border-left: 2px solid var(--accent);
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            grid-column: 1;
        }

        .card-match-count {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent2);
            background: #7c6aff1a;
            border-radius: 10px;
            padding: 1px 7px;
            white-space: nowrap;
            grid-column: 2;
            grid-row: 1;
            align-self: center;
        }

        .card-stats {
            font-size: 10px;
            color: var(--muted);
            grid-column: 1 / -1;
            margin-top: 2px;
        }

        .card-snippet {
            font-size: 11px;
            color: #9090a0;
            grid-column: 1 / -1;
            line-height: 1.4;
            margin-top: 3px;
            overflow: hidden;
            display: -webkit-box;
            line-clamp: 2;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-snippet mark {
            background: var(--match);
            color: var(--match-text);
            border-radius: 2px;
            padding: 0 1px;
        }

        /* ── RIGHT ── */
        #right {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        #right-header {
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #thread-title {
            font-family: var(--serif);
            font-size: 16px;
            font-style: italic;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #thread-meta {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        #copy-btn {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--muted);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 10px;
            white-space: nowrap;
            transition: color 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        #copy-btn:hover:not(:disabled) {
            color: var(--accent2);
            border-color: var(--accent);
        }

        #copy-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        #copy-btn.copied {
            color: #4ade80;
            border-color: #4ade80;
        }

        #web-btn {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--muted);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 10px;
            white-space: nowrap;
            transition: color 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        #web-btn:hover:not(:disabled) {
            color: var(--accent2);
            border-color: var(--accent);
        }

        #web-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        #chat-search-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        #chat-search-wrap input {
            width: 200px;
        }

        .nav-btn {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            line-height: 1;
            transition: color 0.1s, border-color 0.1s;
        }

        .nav-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        #match-indicator {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            min-width: 60px;
            text-align: center;
        }

        #thread {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 13px;
            flex-direction: column;
            gap: 8px;
        }

        #empty-state span {
            font-family: var(--serif);
            font-style: italic;
            font-size: 18px;
            color: #3a3a4a;
        }

        /* ── Messages ── */
        .msg {
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 13px;
            max-width: 720px;
            width: 100%;
            align-self: center;
            border: 1px solid transparent;
            transition: border-color 0.15s;
        }

        .msg.human {
            background: var(--human);
            /* align-self: flex-end; */
            /* max-width: 75%; */
            border-color: var(--border2);
        }

        .msg.assistant {
            background: var(--assistant);
            border-color: var(--border);
        }

        .msg-sender {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .msg.human .msg-sender {
            color: var(--accent2);
        }

        .msg mark {
            background: var(--match);
            color: var(--match-text);
            border-radius: 2px;
            padding: 0 2px;
        }

        .msg.current-match {
            border-color: var(--highlight-border);
            box-shadow: 0 0 0 1px var(--highlight-border) inset;
        }

        /* ── Markdown ── */
        .msg-body p {
            margin-bottom: 0.6em;
        }

        .msg-body p:last-child {
            margin-bottom: 0;
        }

        .msg-body h1,
        .msg-body h2,
        .msg-body h3 {
            font-family: var(--serif);
            font-style: italic;
            margin: 0.8em 0 0.3em;
            color: var(--accent2);
        }

        .msg-body h1 {
            font-size: 1.2em;
        }

        .msg-body h2 {
            font-size: 1.05em;
        }

        .msg-body h3 {
            font-size: 0.95em;
        }

        .msg-body code {
            background: #1e1e2a;
            border: 1px solid var(--border2);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.9em;
        }

        .msg-body pre {
            background: #1e1e2a;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            margin: 0.6em 0;
        }

        .msg-body pre code {
            background: none;
            border: none;
            padding: 0;
        }

        .msg-body ul,
        .msg-body ol {
            padding-left: 1.4em;
            margin: 0.4em 0;
        }

        .msg-body li {
            margin-bottom: 0.2em;
        }

        .msg-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            color: var(--muted);
            margin: 0.5em 0;
        }

        .msg-body strong {
            color: var(--text);
            font-weight: 700;
        }

        .msg-body em {
            font-style: italic;
            color: #c0b0f0;
        }

        .msg-body a {
            color: var(--accent2);
            text-decoration: underline;
        }

        .msg-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0.8em 0;
        }

        .msg-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.5em 0;
            font-size: 12px;
        }

        .msg-body th,
        .msg-body td {
            border: 1px solid var(--border2);
            padding: 5px 8px;
        }

        .msg-body th {
            background: var(--surface2);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        .loading {
            color: var(--muted);
            padding: 20px;
            text-align: center;
        }

        #chart-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000000aa;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #chart-modal.open {
            display: flex;
        }

        #chart-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 24px;
            width: 820px;
            max-width: 95vw;
        }

        #chart-box h2 {
            font-family: var(--serif);
            font-style: italic;
            color: var(--accent2);
            font-size: 18px;
            margin-bottom: 16px;
        }

        #chart-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chart-btn {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--muted);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 10px;
            transition: color 0.1s, border-color 0.1s;
        }

        .chart-btn:hover {
            color: var(--accent2);
            border-color: var(--accent);
        }

        .chart-btn.active {
            color: var(--accent2);
            border-color: var(--accent);
            background: #7c6aff1a;
        }

        #chart-close {
            margin-left: auto;
        }

        #chart-wrap .uplot {
            margin: 0 auto;
        }

        .uplot text {
            fill: var(--muted) !important;
        }
    </style>
</head>

<body>
    <div id="app">

        <div id="left">
            <div id="left-header">
                <h1>airs</h1>
                <div class="search-wrap">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input id="global-search" type="text" placeholder="search conversations…" autocomplete="off" />
                </div>
                <button id="export-btn" onclick="exportList()"
                    style="margin-top:8px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px;cursor:pointer;">
                    export list
                </button>
                <button id="chart-btn-open" onclick="openChart()"
                    style="margin-top:6px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px;cursor:pointer;">
                    activity chart
                </button>
            </div>
            <div id="result-meta"></div>
            <div id="convo-list">
                <div class="loading">loading…</div>
            </div>
        </div>

        <div id="right">
            <div id="right-header">
                <div id="thread-title" style="color:var(--muted)">select a conversation</div>
                <div id="thread-meta"></div>
                <button id="copy-btn" disabled>copy for substack</button>
                <button id="web-btn" disabled onclick="window.open('https://claude.ai/chat/' + activeUuid, '_blank')">
                    open on web
                </button>
                <div id="chat-search-wrap">
                    <div class="search-wrap">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <input id="chat-search" type="text" placeholder="search in thread…" autocomplete="off"
                            disabled />
                    </div>
                    <button class="nav-btn" id="prev-match">↑</button>
                    <button class="nav-btn" id="next-match">↓</button>
                    <div id="match-indicator"></div>
                </div>
            </div>
            <div id="thread">
                <div id="empty-state">
                    <span>airs</span>
                    <div>select a conversation to begin</div>
                </div>
            </div>
        </div>

    </div>

    <div id="chart-modal">
        <div id="chart-box">
            <h2>chat activity</h2>
            <div id="chart-controls">
                <button class="chart-btn active" data-period="day">day</button>
                <button class="chart-btn" data-period="week">week</button>
                <button class="chart-btn" data-period="month">month</button>
                <button class="chart-btn" data-period="quarter">quarter</button>
                <button class="chart-btn" data-period="year">year</button>
                <span style="width:1px;height:20px;background:var(--border2);margin:0 4px"></span>
                <button class="chart-btn active" data-metric="chats">chats</button>
                <button class="chart-btn active" data-metric="messages">messages</button>
                <button class="chart-btn" id="chart-close">✕</button>
            </div>
            <div id="chart-wrap"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080/api';

        // ── State ──────────────────────────────────────────────────────────────────
        let allConvos = [];
        let activeUuid = null;
        let chatMatches = [];
        let chatMatchIdx = 0;
        let debounceTimer = null;
        let chartData = [];

        // ── Elements ───────────────────────────────────────────────────────────────
        const globalSearch = document.getElementById('global-search');
        const convoList = document.getElementById('convo-list');
        const resultMeta = document.getElementById('result-meta');
        const threadTitle = document.getElementById('thread-title');
        const threadMeta = document.getElementById('thread-meta');
        const thread = document.getElementById('thread');
        const chatSearch = document.getElementById('chat-search');
        const prevBtn = document.getElementById('prev-match');
        const nextBtn = document.getElementById('next-match');
        const matchIndicator = document.getElementById('match-indicator');
        const copyBtn = document.getElementById('copy-btn');

        // ── Init ───────────────────────────────────────────────────────────────────
        fetchConvos('');

        // ── Global search ──────────────────────────────────────────────────────────
        globalSearch.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchConvos(globalSearch.value), 180);
        });

        async function fetchConvos(q) {
            const url = q ? `${API}/search?q=${encodeURIComponent(q)}&limit=500` : `${API}/search?limit=500`;
            const res = await fetch(url);
            const data = await res.json();
            allConvos = data.convos;
            renderConvoList(allConvos, q);
            resultMeta.textContent = q
                ? `${data.total} match${data.total !== 1 ? 'es' : ''} for "${q}"`
                : `${data.total} conversations`;
        }

        function renderConvoList(convos, q) {
            if (!convos.length) {
                convoList.innerHTML = '<div class="loading">no results</div>';
                return;
            }
            convoList.innerHTML = convos.map(c => {
                const d1 = fmtDate(c.created_at);
                const d2 = fmtDate(c.updated_at);
                const stats = `${d1} → ${d2} · ${c.message_count} msgs`;
                const snippet = c.snippet ? highlightSnippet(c.snippet, q) : '';
                const matchBadge = c.match_count > 0
                    ? `<div class="card-match-count">${c.match_count}</div>`
                    : '';
                return `
      <div class="convo-card${c.uuid === activeUuid ? ' active' : ''}" data-uuid="${c.uuid}">
        <div class="card-title">${escHtml(c.name ? c.name : "[untitled]")}</div>
        ${matchBadge}
        <div class="card-stats">${stats}</div>
        ${snippet ? `<div class="card-snippet">${snippet}</div>` : ''}
      </div>
    `;
            }).join('');

            convoList.querySelectorAll('.convo-card').forEach(el => {
                el.addEventListener('click', () => loadThread(el.dataset.uuid));
            });
        }

        // ── Thread load ────────────────────────────────────────────────────────────
        async function loadThread(uuid) {
            activeUuid = uuid;
            renderConvoList(allConvos, globalSearch.value);

            thread.innerHTML = '<div class="loading">loading…</div>';
            chatSearch.disabled = true;
            chatSearch.value = '';
            copyBtn.disabled = true;
            document.getElementById('web-btn').disabled = true;
            clearChatSearch();

            const res = await fetch(`${API}/thread/${uuid}`);
            const data = await res.json();

            threadTitle.textContent = data.convo.name;
            threadTitle.style.color = '';
            threadMeta.textContent = `${data.messages.length} messages`;
            chatSearch.disabled = false;
            copyBtn.disabled = false;
            document.getElementById('web-btn').disabled = false;

            thread.innerHTML = '';
            data.messages.forEach(m => {
                const el = document.createElement('div');
                el.className = `msg ${m.sender}`;
                el.dataset.uuid = m.uuid;
                el.dataset.raw = m.text; // store raw text for search
                el.dataset.ts = m.created_at;
                el.innerHTML = `
      <div class="msg-sender">${m.sender === 'human' ? 'me' : 'claude'} · ${m.created_at}</div>
      <div class="msg-body">${marked.parse(m.text)}</div>
    `;
                thread.appendChild(el);
            });

            if (chatSearch.value) applyChatSearch(chatSearch.value);
        }

        // ── In-thread search ───────────────────────────────────────────────────────
        chatSearch.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => applyChatSearch(chatSearch.value), 120);
        });

        prevBtn.addEventListener('click', () => stepMatch(-1));
        nextBtn.addEventListener('click', () => stepMatch(1));
        copyBtn.addEventListener('click', copyForSubstack);

        chatSearch.addEventListener('keydown', e => {
            if (e.key === 'Enter') e.shiftKey ? stepMatch(-1) : stepMatch(1);
        });

        function applyChatSearch(q) {
            // Reset all message bodies back to rendered markdown
            thread.querySelectorAll('.msg').forEach(el => {
                el.classList.remove('current-match');
                el.querySelector('.msg-body').innerHTML = marked.parse(el.dataset.raw || '');
            });

            chatMatches = [];
            chatMatchIdx = 0;

            if (!q) { matchIndicator.textContent = ''; return; }

            const ql = q.toLowerCase();
            thread.querySelectorAll('.msg').forEach(el => {
                const raw = el.dataset.raw || '';
                if (raw.toLowerCase().includes(ql)) {
                    highlightInDom(el.querySelector('.msg-body'), ql, q);
                    chatMatches.push(el);
                }
            });

            matchIndicator.textContent = chatMatches.length ? `1 / ${chatMatches.length}` : 'no matches';
            if (chatMatches.length) { chatMatchIdx = 0; scrollToMatch(0); }
        }

        function stepMatch(dir) {
            if (!chatMatches.length) return;
            chatMatches[chatMatchIdx].classList.remove('current-match');
            chatMatchIdx = (chatMatchIdx + dir + chatMatches.length) % chatMatches.length;
            scrollToMatch(chatMatchIdx);
        }

        function scrollToMatch(idx) {
            const el = chatMatches[idx];
            el.classList.add('current-match');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            matchIndicator.textContent = `${idx + 1} / ${chatMatches.length}`;
        }

        function clearChatSearch() {
            chatMatches = [];
            chatMatchIdx = 0;
            matchIndicator.textContent = '';
        }

        // ── Highlight in rendered DOM (walks text nodes) ───────────────────────────
        function highlightInDom(root, ql, q) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            const nodes = [];
            let node;
            while (node = walker.nextNode()) nodes.push(node);
            nodes.forEach(n => {
                if (!n.textContent.toLowerCase().includes(ql)) return;
                const span = document.createElement('span');
                span.innerHTML = highlightExact(n.textContent, q);
                n.parentNode.replaceChild(span, n);
            });
        }

        // ── Copy for Substack ──────────────────────────────────────────────────────
        function substackBody(innerHTML) {
            const tmp = document.createElement('div');
            tmp.innerHTML = innerHTML;
            tmp.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => {
                const p = document.createElement('p');
                p.innerHTML = `<strong>${h.innerHTML}</strong>`;
                h.replaceWith(p);
            });
            return tmp.innerHTML;
        }

        function copyForSubstack() {
            const msgs = [...thread.querySelectorAll('.msg')];
            if (!msgs.length) return;

            const title = threadTitle.textContent;
            let html = `<h2>${escHtml(title)}</h2>\n`;
            msgs.forEach(el => {
                const isHuman = el.classList.contains('human');
                const ts = el.dataset.ts ?? '';
                const label = (isHuman ? '[Me]' : '[Claude]') + (ts ? ` — ${ts}` : '');
                const body = substackBody(el.querySelector('.msg-body').innerHTML);
                html += `<p><strong>${label}</strong></p>\n${body}\n`;
            });

            // Use a hidden contenteditable div — works on HTTP without ClipboardItem
            const el = document.createElement('div');
            el.contentEditable = 'true';
            el.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
            el.innerHTML = html;
            document.body.appendChild(el);

            const sel = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(el);
            sel.removeAllRanges();
            sel.addRange(range);

            const ok = document.execCommand('copy');
            sel.removeAllRanges();
            document.body.removeChild(el);

            copyBtn.textContent = ok ? 'copied!' : 'failed :(';
            copyBtn.classList.toggle('copied', ok);
            setTimeout(() => { copyBtn.textContent = 'copy for substack'; copyBtn.classList.remove('copied'); }, 2000);
        }

        // ── Helpers ────────────────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function highlightSnippet(text, q) {
            if (!q) return escHtml(text);
            return highlightExact(text, q);
        }

        function highlightExact(text, q) {
            if (!q) return escHtml(text);
            const ql = q.toLowerCase();
            const tl = text.toLowerCase();
            const parts = [];
            let i = 0;
            while (i < text.length) {
                const j = tl.indexOf(ql, i);
                if (j === -1) { parts.push(escHtml(text.slice(i))); break; }
                parts.push(escHtml(text.slice(i, j)));
                parts.push(`<mark>${escHtml(text.slice(j, j + q.length))}</mark>`);
                i = j + q.length;
            }
            return parts.join('');
        }

        function fmtDate(iso) {
            if (!iso) return '?';
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        async function exportList() {
            const res = await fetch(`${API}/search?limit=9999`);
            const data = await res.json();
            const lines = data.convos.map(c => `${c.uuid}\t${c.name ? c.name : "[untitled]"}\t${c.created_at}\t${c.updated_at}\t${c.message_count} msgs`);
            const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'chats.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        // ── Chart ──────────────────────────────────────────────────────────────────
        let chartPeriod = 'day';
        let chartMetrics = { chats: true, messages: true };
        let uplot = null;

        document.getElementById('chart-close').addEventListener('click', () => {
            document.getElementById('chart-modal').classList.remove('open');
        });

        document.getElementById('chart-modal').addEventListener('click', e => {
            if (e.target === document.getElementById('chart-modal'))
                document.getElementById('chart-modal').classList.remove('open');
        });

        document.querySelectorAll('[data-period]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartPeriod = btn.dataset.period;
                renderChart(chartData);
            });
        });

        document.querySelectorAll('[data-metric]').forEach(btn => {
            btn.addEventListener('click', () => {
                const m = btn.dataset.metric;
                chartMetrics[m] = !chartMetrics[m];
                btn.classList.toggle('active', chartMetrics[m]);
                renderChart(chartData);
            });
        });

        async function openChart() {
            document.getElementById('chart-modal').classList.add('open');
            const res = await fetch(`${API}/search?limit=9999`);
            const data = await res.json();
            chartData = data.convos;
            renderChart(data.convos);
        }

        function bucketKey(date, period) {
            const d = new Date(date);
            switch (period) {
                case 'day': return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime() / 1000;
                case 'week': {
                    const day = d.getDay();
                    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                    return new Date(d.getFullYear(), d.getMonth(), diff).getTime() / 1000;
                }
                case 'month': return new Date(d.getFullYear(), d.getMonth(), 1).getTime() / 1000;
                case 'quarter': return new Date(d.getFullYear(), Math.floor(d.getMonth() / 3) * 3, 1).getTime() / 1000;
                case 'year': return new Date(d.getFullYear(), 0, 1).getTime() / 1000;
            }
        }

        function renderChart(convos) {
            // bucket all convos
            const chatBuckets = {};
            const msgBuckets = {};

            // fetch full list 
            const src = convos;
            src.forEach(c => {
                const k = bucketKey(c.created_at, chartPeriod);
                if (k == null) return;
                chatBuckets[k] = (chatBuckets[k] || 0) + 1;
                msgBuckets[k] = (msgBuckets[k] || 0) + c.message_count;
            });

            // fill date spine
            const keys = Object.keys(chatBuckets).map(Number).sort((a, b) => a - b);
            if (!keys.length) return;

            const times = [];
            const chats = [];
            const msgs = [];

            // spine: fill gaps with 0
            let cur = keys[0];
            const last = keys[keys.length - 1];
            const step = periodStep(chartPeriod, cur);

            while (cur <= last) {
                times.push(cur);
                chats.push(chartMetrics.chats ? (chatBuckets[cur] || 0) : null);
                msgs.push(chartMetrics.messages ? (msgBuckets[cur] || 0) : null);
                cur = nextBucket(chartPeriod, cur);
            }

            const wrap = document.getElementById('chart-wrap');
            if (uplot) { uplot.destroy(); uplot = null; }
            wrap.innerHTML = '';

            const series = [{}]; // x
            const data = [new Float64Array(times)];

            if (chartMetrics.chats) {
                series.push({ label: 'chats', stroke: '#7c6aff', fill: '#7c6aff33', width: 2 });
                data.push(new Float64Array(chats));
            }
            if (chartMetrics.messages) {
                series.push({ label: 'messages', stroke: '#fbbf24', width: 2, dash: [4, 2] });
                data.push(new Float64Array(msgs));
            }

            if (series.length === 1) return; // nothing to show

            const opts = {
                width: wrap.clientWidth || 760,
                height: 300,
                scales: { x: { time: true }, y: { range: (u, min, max) => [0, max * 1.1 || 1] } },
                axes: [
                    { stroke: '#6b6b7a', ticks: { stroke: '#27272d' }, grid: { stroke: '#27272d' }, font: '11px monospace' },
                    { stroke: '#6b6b7a', ticks: { stroke: '#27272d' }, grid: { stroke: '#27272d' }, font: '11px monospace' },
                ],
                series,
                cursor: { stroke: '#7c6aff55' },
            };

            uplot = new uPlot(opts, data, wrap);
        }

        function periodStep(period, ts) {
            // approximate step in seconds for gap detection (unused but kept for clarity)
            return { day: 86400, week: 604800, month: 2592000, quarter: 7776000, year: 31536000 }[period];
        }

        function nextBucket(period, ts) {
            const d = new Date(ts * 1000);
            switch (period) {
                case 'day': return new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1).getTime() / 1000;
                case 'week': return new Date(d.getFullYear(), d.getMonth(), d.getDate() + 7).getTime() / 1000;
                case 'month': return new Date(d.getFullYear(), d.getMonth() + 1, 1).getTime() / 1000;
                case 'quarter': return new Date(d.getFullYear(), d.getMonth() + 3, 1).getTime() / 1000;
                case 'year': return new Date(d.getFullYear() + 1, 0, 1).getTime() / 1000;
            }
        }
    </script>
